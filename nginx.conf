server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy same-origin para Plone (PDFs sem CORS no Varnish)
    location /__plone__/ {
        proxy_pass https://www3.ufac.br/;
        proxy_ssl_server_name on;
        proxy_set_header Host www3.ufac.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 120s;
        client_max_body_size 100m;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/pdf;
}
